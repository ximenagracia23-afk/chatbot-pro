<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chatbot PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat {
  width: 360px;
  height: 600px;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.header {
  background: linear-gradient(90deg,#22c55e,#4ade80);
  padding: 15px;
  text-align: center;
  color: white;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 12px;
  max-width: 80%;
  animation: fade 0.3s ease;
}

.user {
  background: #3b82f6;
  color: white;
  margin-left: auto;
}

.bot {
  background: #1e293b;
  color: white;
}

.input {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  outline: none;
}

button {
  margin-left: 5px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="chat">
  <div class="header">💬 Mi Negocio PRO</div>

  <div id="chat" class="chat-box"></div>

  <div class="input">
    <input id="input" placeholder="Escribe..." />
    <button onclick="enviar()">Enviar</button>
  </div>
</div>

<script>
// 📲 obtener número dinámico
function obtenerWhatsApp() {
  return localStorage.getItem("whatsapp") || "593000000000";
}

// enviar mensaje
function enviar() {
  let input = document.getElementById("input");
  let mensaje = input.value.toLowerCase().trim();
  if (!mensaje) return;

  agregar(mensaje, "user");
  guardarCliente(mensaje);

  let respuesta = responder(mensaje);

  setTimeout(() => {
    agregar(respuesta, "bot");
  }, 500);

  input.value = "";
}

// agregar mensaje UI
function agregar(texto, tipo) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "msg " + tipo;
  div.innerText = texto;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🤖 BOT VENDEDOR
function responder(mensaje) {
  let numero = obtenerWhatsApp();

  if (mensaje.includes("hola")) {
    return "👋 Hola! Bienvenido.\n\n¿Quieres ver precios o comprar?";
  }

  if (mensaje.includes("precio") || mensaje.includes("cuanto")) {
    return "💰 Plan PRO: $10\n🚀 Incluye chatbot listo para vender\n\n👉 ¿Quieres comprar?";
  }

  if (mensaje.includes("comprar") || mensaje.includes("quiero")) {
    return "🔥 Excelente decisión!\n\n👉 Compra aquí:\nhttps://wa.me/" + numero;
  }

  if (mensaje === "si" || mensaje.includes("sí")) {
    return "🚀 Escríbenos aquí:\nhttps://wa.me/" + numero;
  }

  if (mensaje.includes("contacto") || mensaje.includes("whatsapp")) {
    return "📲 Escríbenos aquí:\nhttps://wa.me/" + numero;
  }

  if (mensaje.includes("gracias")) {
    return "😊 Con gusto! Estoy para ayudarte";
  }

  return "🤖 Puedes escribir:\n• precio\n• comprar\n• contacto";
}

// 💾 guardar clientes
function guardarCliente(mensaje) {
  let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

  clientes.push({
    mensaje: mensaje,
    fecha: new Date().toLocaleString()
  });

  localStorage.setItem("clientes", JSON.stringify(clientes));
}

// ENTER
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") enviar();
});
</script>

</body>
</html>
