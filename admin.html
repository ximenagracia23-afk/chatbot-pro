<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

input {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  margin-top: 10px;
  background: #22c55e;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 8px;
}

.danger {
  background: red;
}
</style>
</head>

<body>

<h1>📊 Panel Admin</h1>

<h2>⚙️ Configurar WhatsApp</h2>
<input id="numero" placeholder="Ej: 593999999999">
<button onclick="guardarNumero()">Guardar número</button>

<h2>👥 Clientes</h2>
<div id="clientes"></div>

<button class="danger" onclick="borrar()">🗑️ Borrar clientes</button>

<script>
function cargar() {
  let datos = JSON.parse(localStorage.getItem("clientes")) || [];
  let contenedor = document.getElementById("clientes");

  contenedor.innerHTML = "";

  datos.reverse().forEach(c => {
    contenedor.innerHTML += `
      <div class="card">
        💬 ${c.mensaje}<br>
        🕒 ${c.fecha}
      </div>
    `;
  });

  document.getElementById("numero").value =
    localStorage.getItem("whatsapp") || "";
}

// guardar número
function guardarNumero() {
  let numero = document.getElementById("numero").value;
  localStorage.setItem("whatsapp", numero);
  alert("✅ Número guardado");
}

// borrar clientes
function borrar() {
  localStorage.removeItem("clientes");
  cargar();
}

cargar();
</script>

</body>
</html>
